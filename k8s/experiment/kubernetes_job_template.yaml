apiVersion: batch/v1
kind: Job
metadata:
  name: "kto-titanic"
  namespace: arielemmanuel-dev
spec:
  ttlSecondsAfterFinished: 100
  backoffLimit: 0
  template:
    spec:
      containers:
        - name: "kto-titanic"
          image: "quay.io/arielemmanuel/titanic/experiment"
          command:
            [
              "uv", "-n", "run", "--no-sync",
              "-m", "titanic.training.main",
              "--input_data_path", "/data/titanic.csv",
              "--n_estimators", "100",
              "--max_depth", "10",
              "--random_state", "42"
            ]
          resources:
            limits:
              cpu: 600m
              memory: 4000Mi
            requests:
              cpu: 600m
              memory: 4000Mi
      restartPolicy: Never
